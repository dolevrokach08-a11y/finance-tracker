name: Daily Price Fetch

on:
  schedule:
    - cron: '0 14 * * 1-5'  # During US market hours (weekdays)
    - cron: '0 21 * * *'    # After US market close (daily)
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        # yahoo-finance2 removed — Yahoo 429s GitHub runner IPs, so the script
        # now fetches chart data through the Cloudflare Worker with plain fetch.
        run: |
          cd scripts
          npm install firebase-admin
      
      - name: Fetch and save prices
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd scripts
          node fetch-prices.js
