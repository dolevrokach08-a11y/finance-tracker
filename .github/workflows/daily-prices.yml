name: Daily Price Fetch

on:
  schedule:
    - cron: '0 14 * * 1-5'  # During US market hours (weekdays)
    - cron: '0 21 * * *'    # After US market close (daily)
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        # yahoo-finance2 pinned to 2.13 — the last version where the default
        # export is a singleton with quote()/chart(). 2.14+ and v3 changed the
        # API to a class and silently broke all fetches (action stayed green).
        run: |
          cd scripts
          npm install firebase-admin yahoo-finance2@2.13
      
      - name: Fetch and save prices
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          cd scripts
          node fetch-prices.js
