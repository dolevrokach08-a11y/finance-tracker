name: Max Scraper (validation)

# Phase 2a: manual-only run to confirm Max login works from a cloud IP
# without an OTP step-up. No schedule yet — that comes in phase 2b once
# the script also posts to the Worker.
on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (downloads Chromium)
        run: |
          cd scraper
          npm install

      - name: Run Max scraper (validation only)
        env:
          MAX_USERNAME: ${{ secrets.MAX_USERNAME }}
          MAX_PASSWORD: ${{ secrets.MAX_PASSWORD }}
        run: |
          cd scraper
          node scrape-max.mjs
